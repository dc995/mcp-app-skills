name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: mcp-app-ext/mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mcp-app-ext/mcp-server/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run validate:matrix
      - run: npm run smoke
      - run: npm audit --omit=dev
      - name: Validate repository documents and links
        working-directory: .
        run: node scripts/validate-repo.mjs
      - name: Check generated host summary
        working-directory: .
        run: node scripts/generate-host-summary.mjs --check
